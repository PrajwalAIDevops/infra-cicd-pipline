---
- name: Update apt repo and install baseline packages
  apt:
    name: [ 'apt-transport-https', 'ca-certificates', 'curl', 'gnupg', 'software-properties-common' ]
    state: present
    update_cache: yes

- name: Create directory for Docker repository key
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker official GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker repository to apt sources
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install containerd runtime engine
  apt:
    name: containerd.io
    state: present
    update_cache: yes

- name: Configure containerd to use SystemdCgroup
  shell: |
    mkdir -p /etc/containerd
    containerd config default > /etc/containerd/config.toml
    sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
  notify: Restart containerd

- name: Disable swap memory (Required by Kubernetes)
  command: swapoff -a