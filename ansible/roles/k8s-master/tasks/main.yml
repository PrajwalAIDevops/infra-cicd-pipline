---
- name: Initialize Kubernetes Control Plane via Kubeadm
  command: kubeadm init --pod-network-cidr={{ pod_network_cidr }}
  register: kubeadm_init_output
  args:
    creates: /etc/kubernetes/admin.conf

- name: Setup kubeconfig directory for Ubuntu administrator
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu

- name: Copy admin configuration to home profile
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: yes
    owner: ubuntu
    group: ubuntu

- name: Generate dynamic Join command token for workers
  command: kubeadm token create --print-join-command
  register: join_command_raw

- name: Store token locally as a fact for worker reference
  set_fact:
    k8s_join_command: "{{ join_command_raw.stdout }}"